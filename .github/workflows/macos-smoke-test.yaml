name: macOS Smoke Test
on:
  # Run on push and pull requests, but limit to important branches to save macOS runner minutes
  push:
    branches:
      - master
      - release-*
      - localtest
  pull_request:
    branches:
      - master
      - release-*
  # Allow manual triggering for testing
  workflow_dispatch:

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # for actions/checkout to fetch code

env:
  BUILD_FROM_SOURCE: "true"

jobs:
  macos-smoke-test:
    name: macOS Smoke Test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60  # Increased for image building on macOS
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon Mac (Intel Mac macos-13 not available on fork for testing)
          - os: macos-14
            arch: apple-silicon

    steps:
      - name: free disk space
        run: |
          df -h
          # Remove Xcode simulators and derived data (large, not needed for CI)
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches
          # Clean brew cache
          brew cleanup --prune=all
          df -h

      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: verify system architecture
        run: |
          uname -a
          go env GOOS GOARCH
          sw_vers
          df -h

      - name: install and start Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "dns": ["8.8.8.8"]
            }

      - name: setup and deploy karmada
        run: |
          hack/local-up-karmada.sh

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-test-logs-${{ matrix.arch }}
          path: |
            /tmp/karmada/
            ~/.kube/karmada.config
            ~/.kube/members.config
          retention-days: 7
          if-no-files-found: ignore