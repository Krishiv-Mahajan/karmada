name: macOS Smoke Test

on:
  push:
    branches:
      - master
      - release-*
      - localtest
  pull_request:
    branches:
      - master
      - release-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-smoke-test:
    name: macOS Smoke Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.arch }}
      cancel-in-progress: true
    strategy:
      matrix:
        include:
          - arch: intel
            runner: macos-15-intel  # x86_64, free tier, supported until Aug 2027
          - arch: apple-silicon
            runner: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required for versioning via git tags
          fetch-tags: true

      - name: Fetch tags for versioning
        run: git fetch --tags --force origin

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify environment
        run: |
          uname -a
          sw_vers
          go version
          go env GOOS GOARCH

      - name: Set binary output path
        run: |
          # Depends on setup-go so GOOS/GOARCH resolve from the runner toolchain.
          echo "BIN_DIR=./_output/bin/$(go env GOOS)/$(go env GOARCH)" >> "$GITHUB_ENV"

      # Build all components
      - name: Build Karmada binaries
        run: make all

      # Ensure binaries are generated
      - name: Verify binaries
        run: |
          echo "Listing built binaries:"
          ls -lh "$BIN_DIR"

      # Core binary sanity (no runtime crash)
      - name: Validate core components
        run: |
          "$BIN_DIR"/karmada-aggregated-apiserver --help
          "$BIN_DIR"/karmada-controller-manager --help
          "$BIN_DIR"/karmada-scheduler --help

      # CLI workflow validation
      - name: Validate CLI commands
        run: |
          "$BIN_DIR"/karmadactl --help
          "$BIN_DIR"/karmadactl init --help
          "$BIN_DIR"/karmadactl join --help
          "$BIN_DIR"/karmadactl version --client 2>&1 | grep -E 'GitVersion:"[^"]+".*GitCommit:"[0-9a-f]{40}"' || {
            echo "Version output did not contain expected pattern"
            exit 1
          }

      # Unit tests
      - name: Run unit tests
        run: make test

      - name: Upload coverage (if present)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-smoke-test-coverage-${{ matrix.arch }}
          path: ./_output/coverage/
          retention-days: 1
          if-no-files-found: ignore

  # Full control-plane bring-up test with Docker (Apple Silicon only for cost)
  macos-e2e-full-bringup:
    name: macOS Full E2E (Control-Plane Bring-up)
    runs-on: macos-14  # Apple Silicon only
    timeout-minutes: 60
    continue-on-error: true  # Don't fail the workflow if this fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set binary output path
        run: |
          echo "BIN_DIR=./_output/bin/$(go env GOOS)/$(go env GOARCH)" >> "$GITHUB_ENV"

      - name: Build Karmada binaries
        run: make all

      - name: Install Homebrew dependencies
        run: |
          brew update
          # Install Docker and kind for Kubernetes testing
          brew install docker kind

      - name: Start Docker daemon
        run: |
          echo "Starting Docker daemon..."
          # On macOS, Docker Desktop must be running
          # Try to start Docker service if available
          open -a Docker || {
            echo "Docker Desktop not available. Attempting colima (lightweight container runtime)..."
            brew install colima
            colima start --memory 4 --cpu 2
          }

          # Wait for Docker to be ready
          for i in {1..30}; do
            docker ps > /dev/null 2>&1 && echo "✓ Docker is ready" && break
            echo "Waiting for Docker... ($i/30)"
            sleep 2
          done

      - name: Verify Docker
        run: |
          docker --version
          docker ps

      - name: Setup local Karmada environment
        run: |
          echo "Setting up local Karmada environment..."
          # Export required paths
          export KUBECONFIG_PATH="${HOME}/.kube"
          export MAIN_KUBECONFIG="${KUBECONFIG_PATH}/karmada.config"

          # Run the local setup script
          # This will create Kubernetes clusters and deploy Karmada
          timeout 30m bash hack/local-up-karmada.sh 2>&1 || {
            EXIT_CODE=$?
            echo "⚠️  local-up-karmada.sh exited with code $EXIT_CODE"
            echo "This is expected if Kubernetes setup fails on macOS"
            exit 0  # Don't fail - Docker/kind setup on CI is experimental
          }

      - name: Verify control-plane is running
        continue-on-error: true
        run: |
          export KUBECONFIG="${HOME}/.kube/karmada.config"

          # Check if kubectl can access clusters
          kubectl cluster-info 2>&1 || echo "Cluster info check completed"

          # List karmada resources
          kubectl get clusters 2>&1 || echo "Clusters listing attempted"

          echo "Control-plane verification completed"

      - name: Run basic E2E validation
        continue-on-error: true
        run: |
          export KUBECONFIG="${HOME}/.kube/karmada.config"

          # Basic smoke tests on running clusters
          kubectl get nodes 2>&1 || echo "Nodes listing attempted"
          kubectl get deployments -A 2>&1 || echo "Deployments listing attempted"

          echo "E2E validation completed"

      - name: Collect logs (if setup failed)
        if: always()
        run: |
          mkdir -p /tmp/karmada-logs

          # Collect Docker logs
          docker ps -a > /tmp/karmada-logs/docker-ps.txt 2>&1 || true
          docker logs $(docker ps -a -q) > /tmp/karmada-logs/container-logs.txt 2>&1 || true

          # Collect kind logs
          [ -d /tmp/karmada ] && cp -r /tmp/karmada /tmp/karmada-logs/ || true

          echo "Logs collected"

      - name: Upload Karmada setup logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-e2e-logs
          path: /tmp/karmada-logs/
          retention-days: 3
          if-no-files-found: ignore