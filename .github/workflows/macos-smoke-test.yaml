name: macOS Smoke Test

on:
  push:
    branches:
      - master
      - release-*
      - localtest
  pull_request:
    branches:
      - master
      - release-*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-smoke-test:
    name: macOS Smoke Test (apple-silicon)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for versioning via git tags

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify environment
        run: |
          uname -a
          sw_vers
          go version
          go env GOOS GOARCH

      # Build all components
      - name: Build Karmada binaries
        run: make all

      # Ensure binaries are generated
      - name: Verify binaries
        run: |
          echo "Listing built binaries:"
          ls -lh ./_output/bin/

      # Core binary sanity (no runtime crash)
      - name: Validate core components
        run: |
          ./_output/bin/karmada-apiserver --help
          ./_output/bin/karmada-controller-manager --help
          ./_output/bin/karmada-scheduler --help

      # CLI workflow validation
      - name: Validate CLI commands
        run: |
          ./_output/bin/karmadactl --help
          ./_output/bin/karmadactl init --help
          ./_output/bin/karmadactl join --help
          ./_output/bin/karmadactl version --client 2>&1 | grep -E 'karmada|v[0-9]' || {
            echo "Version output did not contain expected pattern"
            exit 1
          }

      # Unit tests 
      - name: Run unit tests
        run: make test

      - name: Upload coverage (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-test-coverage
          path: ./_output/coverage/
          retention-days: 1
          if-no-files-found: ignore