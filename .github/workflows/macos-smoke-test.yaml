name: macOS Smoke Test
on:
  # Run on push and pull requests, but limit to important branches to save macOS runner minutes
  push:
    branches:
      - master
      - release-*
      - localtest
  pull_request:
    branches:
      - master
      - release-*
  # Allow manual triggering for testing
  workflow_dispatch:

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.actor }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read  # for actions/checkout to fetch code

jobs:
  macos-smoke-test:
    name: macOS Smoke Test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60  # Increased for image building on macOS
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel Mac
          - os: macos-13
            arch: intel
          # Apple Silicon Mac
          - os: macos-14
            arch: apple-silicon

    steps:
      - name: free disk space
        run: |
          df -h
          # Remove Xcode simulators and derived data (large, not needed for CI)
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches
          # Clean brew cache
          brew cleanup --prune=all
          df -h

      - name: checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: verify system architecture
        run: |
          uname -a
          go env GOOS GOARCH
          sw_vers
          df -h

      - name: start Docker
        run: |
          # On macOS GitHub runners, Docker Desktop should be pre-installed but may not be running
          if ! docker info &> /dev/null; then
            open -a Docker || true
            # Wait for Docker to start (up to 2 minutes)
            for i in {1..60}; do
              if docker info &> /dev/null; then
                break
              fi
              sleep 2
            done

            if ! docker info &> /dev/null; then
              echo "ERROR: Failed to start Docker daemon"
              exit 1
            fi
          fi
          docker --version

      - name: setup and deploy karmada
        run: |
          export BUILD_FROM_SOURCE=true
          hack/local-up-karmada.sh

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-smoke-test-logs-${{ matrix.arch }}
          path: |
            /tmp/karmada/
            ~/.kube/karmada.config
            ~/.kube/members.config
          retention-days: 7
          if-no-files-found: ignore
